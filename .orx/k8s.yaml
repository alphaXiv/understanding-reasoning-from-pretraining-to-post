apiVersion: batch/v1
kind: Job
metadata:
  name: chess-pre2post-{{ORX_RUN}}
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: run
          image: pytorch/pytorch:2.7.1-cuda12.8-cudnn9-runtime
          command: ["bash", "-lc", "eval \"$ORX_SCRIPT\""]
          resources:
            requests:
              nvidia.com/gpu: "8"
              cpu: "32"
              memory: "128Gi"
            limits:
              nvidia.com/gpu: "8"
              cpu: "64"
              memory: "256Gi"
